<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Glass Sidebar Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#7c3aed 0%,transparent 35%),
    radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
    #0f172a;
    overflow-x:hidden;
}

/* Header */
header{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    max-width:1300px;
    height:75px;
    padding:0 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;

    box-shadow:0 10px 40px rgba(0,0,0,.25);
    z-index:1000;
}

.logo{
    font-size:30px;
    font-weight:800;
    background:linear-gradient(135deg,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#menu{
    display:none;    
}

/* Hamburger Button */
.menu-btn{
    width:50px;
    height:50px;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
    cursor:pointer;
    transition:.3s;
}

.menu-btn:hover{
    background:rgba(255,255,255,.15);
    transform:scale(1.05);
}

/* Sidebar */
.sidebar{
    position:fixed;
    top:0;
    left:0;

    width:320px;
    height:100vh;

    background:rgba(15,23,42,.97);
    backdrop-filter:blur(30px);

    transform:translateX(-100%);
    transition:all .5s cubic-bezier(0.22,1,0.36,1);

    border-right:1px solid rgba(255,255,255,.08);
    box-shadow:20px 0 60px rgba(0,0,0,.4);

    padding:25px;
    z-index:1001;
}

/* Open Sidebar */
#menu:checked ~ .sidebar{
    transform:translateX(0);
}

/* Sidebar Header */
.sidebar-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}

.sidebar-logo{
    font-size:24px;
    font-weight:700;
    color:white;
}

.close-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.close-btn:hover{
    transform:rotate(90deg);
    background:rgba(255,255,255,.15);
}

/* Menu */
.menu{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.menu a{
    text-decoration:none;
    color:#cbd5e1;
    padding:16px 18px;
    border-radius:14px;
    font-size:16px;
    font-weight:500;

    opacity:0;
    transform:translateX(-30px);
    transition:.4s;
}

/* Animate Links */
#menu:checked ~ .sidebar .menu a{
    opacity:1;
    transform:translateX(0);
}

.menu a:hover{
    background:rgba(255,255,255,.08);
    color:white;
    padding-left:28px;
}

/* CTA Button */
.cta{
    display:block;
    text-align:center;
    text-decoration:none;
    color:white;
    margin-top:25px;
    padding:15px;
    border-radius:14px;

    background:linear-gradient(
        135deg,
        #06b6d4,
        #8b5cf6
    );

    font-weight:600;
    transition:.3s;
}

.cta:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(139,92,246,.4);
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(4px);

    opacity:0;
    visibility:hidden;
    transition:.4s;
}

/* Open Overlay */
#menu:checked ~ .overlay{
    opacity:1;
    visibility:visible;
}

/* Hero */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{
    color:white;
    font-size:4rem;
    margin-bottom:15px;
}

.hero p{
    color:#cbd5e1;
    font-size:1.2rem;
    max-width:700px;
    line-height:1.8;
}

.hero button{
    margin-top:30px;
    border:none;
    padding:16px 35px;
    border-radius:50px;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:600;

    background:linear-gradient(
        135deg,
        #06b6d4,
        #8b5cf6
    );

    transition:.3s;
}

.hero button:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 30px rgba(139,92,246,.4);
}
</style>

</head>
<body>

<header>

    <div class="logo">NPIFT</div>

    <input type="checkbox" id="menu">

    <label for="menu" class="menu-btn">☰</label>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="sidebar-top">
            <div class="sidebar-logo">NPIFT LMS</div>

            <label for="menu" class="close-btn">
                ✕
            </label>
        </div>

        <div class="menu">
            <a href="#"> Dashboard</a>
            <a href="#"> Courses</a>
            <a href="#"> Students</a>
            <a href="#"> Faculty</a>
            <a href="#"> Results</a>
            <a href="#"> Settings</a>
            <a href="#"> Contact</a>
            <a href="#" class="cta">
            Get Started
        </a>
        </div>
        

    </div>

    <!-- Overlay -->
    <label for="menu" class="overlay"></label>

</header>

<section class="hero">
    <h1>Future of Learning</h1>

    <p>
        Modern Glassmorphism Sidebar Navigation
        built using HTML, CSS and the General
        Sibling Combinator (~) only.
    </p>

    <button>Explore Courses</button>
</section>

</body>
</html>
