<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        /* box-sizing: border-box; */
    }
.headers{
    width: 100%;
    height: 10vh;
    background-color: rgb(238, 238, 240);
    display: flex;
    justify-content: space-around;
    align-items: center;
}
.headers h1{
    font-size: 24px; 
    font-family: 'Times New Roman', Times, serif;
    text-transform:capitalize;
    color: #ffffff;
}
.headers .planner{
    color: rgb(194, 168, 0);
}
.headers ul{
    display: flex;
    list-style: none;
    justify-content: space-around;
    width: 30%;
    text-align: center;
}
.headers ul li a{
    text-decoration: none;
    color: #000000;
    font-size: 18px;
}
.headers div button{
    padding: 8px 16px;
    margin-left: 10px;
    border: none;
    background-color: rgb(194, 168, 0);
    color: #ffffff;
    font-size: 16px;
    cursor: pointer;
}
</style>
<body>

    <nav class="headers">
        <div><h1>Next <span class="planner">Planner</span></h1></div>
    
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div>

                <button>Login</button>
                <button>Sign up</button>
            </div>
        

    </nav>
    
</body>
</html>
