<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Name</label><br>
        <input type="text" name="" id="" placeholder="Enter your name" required><br>
        <label for="">Email</label><br>
        <input type="email" name="" id="" placeholder="Enter your email" required><br>
        <label for="">Password</label><br>
        <input type="password" name="" id="" placeholder="Enter your password" required><br>
        <label for="">Confirm Password</label><br>
        <input type="password" name="" id="" placeholder="Confirm your password" required><br>
        <label for="">Phone</label><br>
        <input type="tel" name="" id="" placeholder="Enter your phone number" required><br>
        <label for="">DOB</label><br>
        <input type="date" name="" id="" required><br>
        <label for="">Color</label><br>
        <input type="color" name="" id="" required><br>
        <label for="">Are you sure you want to submit?</label><br>
        <input type="checkbox" name="" id="" required><br>
        <label for="">Course</label><br>
        <input type="checkbox" name="" id="">web development<br>
        <input type="checkbox" name="" id="">python<br>
        <input type="checkbox" name="" id="">java<br>
        <input type="checkbox" name="" id="">c++<br>

        <label for="">Are you muslim?</label>
        <input type="radio" name="muslim" id="" required>Yes
        <input type="radio" name="muslim" id="" required>No<br>

        <label for="">state</label>
        <select name="" id="" required>
            <option value="">Select your state</option>
            <option value="">Punjab</option>
            <option value="">Sindh</option>
            <option value="">Khyber Pakhtunkhwa</option>
            <option value="">Balochistan</option>
        </select><br>

        <fieldset>
            <legend>Any Message </legend>
            <textarea name="" id="" cols="30" rows="10" placeholder="Enter your message here"></textarea>
        </fieldset>

         <input type="submit" value="Submit">
    </form>
</body>
</html>
