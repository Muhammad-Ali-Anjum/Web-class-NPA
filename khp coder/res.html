<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        width: 100%;

    }
    .sub{
        width: 23%;
        height: 400px;
        border-radius: 12px;
        box-shadow: 0px 0px 5px rgb(89, 89, 89);
    }
    .sub1 , .sub2{
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-bottom: 20px;
    }
    .sub img{
        width: 100%;
    }
    @media (max-width:992px) {
         .sub1 , .sub2{
            flex-direction: column;
            width: 47%;
         }
        .sub{
            width: 100%;
            margin-bottom: 20px;
        }
        .main{
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
    }
    @media (max-width:632px) {
        .main{
            flex-direction: column;
        }
         .sub1 , .sub2{
            width: 100%;
         }
    }
</style>
<body>
    <div class="main">
       <div class="sub1">
         <div class="sub">
            <img src="../img/carousel-1.jpg" alt="">
         </div>
        <div class="sub"></div>
        <div class="sub"></div>
        <div class="sub"></div>
       </div>
       <div class="sub2">
         <div class="sub"></div>
        <div class="sub"></div>
        <div class="sub"></div>
        <div class="sub"></div>
       </div>
    </div>
</body>
</html>
