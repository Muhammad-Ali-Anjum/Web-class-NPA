<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* selctor  */
    /* element selector */
    div{
        background-color: red;
        width: 400px;
        height: 300px;
    }
    /* universal selector */
    *{
        background-color: wheat;
    }
    /* class selector */
    .main{
        background-color: blue;
    }
    /* id selector */
    #main{
        background-color: green;
    }

</style>
<body>
    <div></div>
    <div class="main"></div>
    <div id="main"></div>
</body>
</html>
