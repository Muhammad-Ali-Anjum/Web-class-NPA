<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    li{
        list-style-type: none;
    }
    a{
        text-decoration: none;
    }
    a:visited{
        color: tomato;
    }
    a:active{
        color: aqua;
    }
    input:checked{
        border: none;
    }
    .con{
        width: 200px;
        height: 300px;
        box-shadow: 0px 0px 5px rgb(139, 139, 139);
        border-radius: 12px;
        margin-top: 20px;
        transition: 2s ;
       
    }
    /* .con:hover{
        width: 211px;
        height: 320px;
    } */
button{
    width: 50%;
    height: 7vh;
    margin: 10px 12px 0px 22px;
    border: none;
    border-radius: 5px;
    background-color: tomato;
    color: white;
    cursor: pointer;
    /* transition: 1s; */
}
button:hover{
    background-color: rgb(254, 79, 48);

}
</style>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">about</a></li>
        <li><a href="#">contact</a></li>
    </ul>
    <input type="text">
    <div class="con">
        <button>Read more</button>
    </div>
</body>
</html>
