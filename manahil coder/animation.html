<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        width: 300px;
        height: 400px;
        border: 2px solid black;
    }
    .sub{
        width: 100px;
        height: 100px;
        background-color: antiquewhite;
        /* animation: name duration timing-function delay iteration-count direction fill-mode; */
        position: relative;
        animation: kuchbi 5s ease-in-out infinite alternate-reverse;
    }
    @keyframes kuchbi {
        0%{
            left: 0%;
            top: 0px;
        }
        25%{
            left: 200px;
            top: 0%;
            background-color: rgb(0, 145, 255);
        }
        50%{
       left: 200px;
            top: 300px;
            background-color: rgb(2, 27, 252);
        }
        75%{
            left: 0px;
            top: 300px;
            background-color: rgb(17, 255, 0);
        }
        100%{
         left: 0px;
            top: 0%;
            background-color: aquamarine;
        }
    }
</style>
<body>
    <div class="main">
        <div class="sub"></div>
    </div>
</body>
</html>
