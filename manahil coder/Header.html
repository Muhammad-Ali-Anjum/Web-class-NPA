     *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
     }
     header{
        width: 100%;
        height: 80px;
        background-color: aliceblue;
        display: flex;
        justify-content: space-around;
        align-items: center;
        position: fixed;

     }
        .logo{
            width: 20%;
            font-size: 24px;
            font-weight: bold;
        }
        .menu{
            width: 40%;

        }
        .menu ul{
            list-style-type: none;
           display: flex;
              justify-content: space-around;
              align-items: center;
        }
        .menu ul li a{
            text-decoration: none;
            color: #333;
            font-size: 18px;
        }
        .btn{
            width: 20%;
            display: flex;
            justify-content: flex-end;
        }
        .btn button{
          padding: 10px 40px ;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .plnr{
            color: #F7941D;
            font-family: 'Arial', sans-serif;
        }
        .hero{
            width: 100%;
            height: 100vh;
            background-image: url(../img/carousel-1.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100vh;
        }
        .hero h1{
            position: relative;
            top: 200px;
            color: white;
            font-size: 45px;
        }
        .about{
            width: 100%;
            height: 100vh;
            background-color: aqua;
        }
       #toggle{
            display: none;
        }

        @media (max-width:768px) {
            .menu,.btn{
                display: none;
            }
            header{
                justify-content: space-between;
                padding-left: 40px;
            }
            #toggle {
                display: block;
                
            }
            .menu1{
                width: 300px;
                height: 600px;
            
                padding-top: 30px;
                position: relative;
                top: 330px;
                right: -100%;
                /* left: -100%; */
                transition: 2s;
                background-color: rgb(255, 255, 255);

            }
             .menu1 ul li a{
            text-decoration: none;
            color: #333;
            font-size: 24px;
            line-height: 50px;
            padding-left: 60px;
        }
            input[type="checkbox"]:checked ~ .menu1{
               right: 0%;

            }
        }

</style>
<body>
    <!-- header -->
    
     <header>

                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
        </nav>
         <input type="checkbox" name="" id="toggle">
          <nav class="menu1">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
        </nav>
        <nav class="btn"> <button>Apply </button></nav>
     </header>
