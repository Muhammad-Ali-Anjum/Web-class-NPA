<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .sub1 , .sub2{
        width: 100%;
        display: flex;
        justify-content: space-around;
        margin-bottom: 20px;
    }
    .sub{
        width: 23%;
        height: 60vh;
        background-color: aquamarine;
    }
    @media (max-width:992px) {
        .sub1 , .sub2{
            flex-direction: column;
            width: 47%;
        }
        .sub{
            width: 100%;
            margin-bottom: 20px;
        }
        .main{
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        
    }
    @media (max-width:632px) {
        .main{
            flex-direction: column;
        }
             .sub1 , .sub2{
                width: 100%;
             }
    }
</style>
<body>
    <div class="main">
        <div class="sub1">
            <div class="sub"></div>
            <div class="sub"></div>
            <div class="sub"></div>
            <div class="sub"></div>
        </div>
        <div class="sub2">
            <div class="sub"></div>
            <div class="sub"></div>
            <div class="sub"></div>
            <div class="sub"></div>
        </div>
    </div>
</body>
</html>
